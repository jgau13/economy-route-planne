<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Route - ESS</title>

    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/63d26f_b22ddda42d0f4dcc8619b741d794ea92~mv2.png">
    <link rel="apple-touch-icon" href="https://static.wixstatic.com/media/63d26f_b22ddda42d0f4dcc8619b741d794ea92~mv2.png">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        window.initFirebaseDriver = (config) => {
            try {
                const app = initializeApp(config, 'driver-app');
                const db = getFirestore(app);
                const storage = getStorage(app);
                const auth = getAuth(app);

                window.fbDb = db;
                window.fbStorage = storage;
                window.fbAuth = auth;
                window.fbDoc = doc;
                window.fbOnSnapshot = onSnapshot;
                window.fbUpdateDoc = updateDoc;
                window.fbAddDoc = addDoc;
                window.fbCollection = collection;
                window.fbStorageRef = ref;
                window.fbUploadBytes = uploadBytes;
                window.fbGetDownloadURL = getDownloadURL;
                window.fbSignInAnon = () => setPersistence(auth, inMemoryPersistence).then(() => signInAnonymously(auth));
                window.firebaseDriverReady = true;
                return true;
            } catch (e) {
                console.error("Firebase init error:", e);
                return false;
            }
        };
    </script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { ess: { blue: '#3178A1', green: '#74B745' } } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader { border: 3px solid #e2e8f0; border-radius: 50%; border-top-color: #74B745; width: 36px; height: 36px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .slide-up { animation: slideUp 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const Icon = ({ name, className = "" }) => {
            const [svg, setSvg] = useState(null);
            useEffect(() => {
                if (typeof lucide === 'undefined' || !lucide.icons) return;
                const key = name.split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join('');
                const data = lucide.icons[key] || lucide.icons[name];
                if (data) { const el = lucide.createElement(data); el.setAttribute('class', className); setSvg(el.outerHTML); }
            }, [name, className]);
            if (!svg) return <span className={className} />;
            return <span dangerouslySetInnerHTML={{ __html: svg }} style={{ display: 'contents' }} />;
        };

        function DriverApp() {
            const [phase, setPhase] = useState('loading'); // loading | ready | error | done
            const [route, setRoute] = useState(null);
            const [token, setToken] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [proofStop, setProofStop] = useState(null); // index of stop awaiting proof decision
            const [uploading, setUploading] = useState(false);
            const fileInputRef = useRef(null);
            const unsubRef = useRef(null);

            // 1. Extract token from URL
            useEffect(() => {
                const t = new URLSearchParams(window.location.search).get('r');
                if (!t) { setErrorMsg('Invalid or missing route link.'); setPhase('error'); return; }
                setToken(t);
            }, []);

            // 2. Init Firebase and subscribe to route
            useEffect(() => {
                if (!token) return;
                let cancelled = false;

                const init = async () => {
                    try {
                        const res = await fetch('/config');
                        const cfg = await res.json();
                        if (!cfg.firebaseConfig) throw new Error('Firebase config unavailable');

                        window.initFirebaseDriver(cfg.firebaseConfig);

                        // Wait for SDK to settle
                        await new Promise(r => {
                            const t = setInterval(() => { if (window.firebaseDriverReady) { clearInterval(t); r(); } }, 80);
                        });

                        // Anonymous auth so writes are permitted
                        await window.fbSignInAnon();

                        const docRef = window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token);
                        unsubRef.current = window.fbOnSnapshot(docRef, snap => {
                            if (cancelled) return;
                            if (!snap.exists()) {
                                setErrorMsg('Route not found or the link has expired.');
                                setPhase('error');
                                return;
                            }
                            const data = snap.data();
                            setRoute(data);
                            setPhase('ready');
                        }, err => {
                            if (cancelled) return;
                            setErrorMsg('Could not load route: ' + err.message);
                            setPhase('error');
                        });
                    } catch (e) {
                        if (!cancelled) { setErrorMsg(e.message); setPhase('error'); }
                    }
                };
                init();
                return () => { cancelled = true; unsubRef.current?.(); };
            }, [token]);

            const markDelivered = async (idx) => {
                if (!route || !token) return;
                const stops = route.stops.map((s, i) =>
                    i === idx ? { ...s, delivered: true, deliveredAt: new Date().toISOString() } : s
                );
                const ref = window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token);
                await window.fbUpdateDoc(ref, { stops });
                setProofStop(idx);
            };

            // Compress image to max 1200px wide, JPEG 75% — keeps files ~200-400 KB
            const compressImage = (file) => new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    const MAX = 1200;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(resolve, 'image/jpeg', 0.75);
                };
                img.src = url;
            });

            const handlePhotoSelected = async (e) => {
                const file = e.target.files?.[0];
                e.target.value = '';
                if (!file || proofStop === null) return;
                setUploading(true);
                try {
                    const compressed = await compressImage(file);
                    const path = `artifacts/${appId}/proofs/${token}/stop_${proofStop}_${Date.now()}.jpg`;
                    const sRef = window.fbStorageRef(window.fbStorage, path);
                    await window.fbUploadBytes(sRef, compressed, { contentType: 'image/jpeg' });
                    const photoUrl = await window.fbGetDownloadURL(sRef);

                    // Update stop with proof URL
                    const stops = route.stops.map((s, i) =>
                        i === proofStop ? { ...s, proofUrl: photoUrl, storagePath: path } : s
                    );
                    await window.fbUpdateDoc(
                        window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token),
                        { stops }
                    );

                    // Save searchable proof record
                    const stop = route.stops[proofStop];
                    const invoiceList = (stop.invoices || '').split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
                    // expireAt = 6 months from now — Firestore TTL policy uses this field to auto-delete
                    const expireAt = new Date(Date.now() + 180 * 24 * 60 * 60 * 1000);
                    await window.fbAddDoc(
                        window.fbCollection(window.fbDb, 'artifacts', appId, 'proof_of_delivery'),
                        {
                            invoices: invoiceList,
                            invoicesRaw: stop.invoices || '',
                            customerName: stop.nombre || stop.name || '',
                            stopAddress: stop.direccion || stop.address || '',
                            driverName: route.driverName || '',
                            driverPhone: route.driverPhone || '',
                            date: route.date || new Date().toISOString().split('T')[0],
                            timestamp: Date.now(),
                            photoUrl,
                            storagePath: path,
                            routeToken: token,
                            zoneName: route.zoneName || '',
                            expireAt
                        }
                    );
                } catch (err) {
                    console.error('Upload error:', err);
                    alert('Could not upload photo. Continuing without proof.');
                } finally {
                    setUploading(false);
                    setProofStop(null);
                }
            };

            // ── Screens ──────────────────────────────────────────────

            if (phase === 'loading') return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <div className="loader" />
                    <p className="text-slate-500 font-medium text-sm">Loading your route…</p>
                </div>
            );

            if (phase === 'error') return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white p-8 text-center gap-4">
                    <div className="text-6xl">⚠️</div>
                    <h2 className="text-xl font-bold text-slate-800">Route Unavailable</h2>
                    <p className="text-slate-500 text-sm max-w-xs">{errorMsg}</p>
                    <p className="text-xs text-slate-400 mt-2">Contact your dispatcher for a new link.</p>
                </div>
            );

            if (!route) return null;

            const stops = route.stops || [];
            const delivered = stops.filter(s => s.delivered).length;
            const total = stops.length;
            const pct = total > 0 ? Math.round((delivered / total) * 100) : 0;
            const allDone = delivered === total && total > 0;

            return (
                <div className="min-h-screen bg-slate-100 pb-12">
                <div className="max-w-lg mx-auto">

                    {/* Hidden camera input */}
                    <input
                        ref={fileInputRef}
                        type="file"
                        accept="image/*"
                        capture="environment"
                        className="hidden"
                        onChange={handlePhotoSelected}
                    />

                    {/* Proof-of-delivery modal */}
                    {proofStop !== null && (
                        <div className="fixed inset-0 z-50 bg-black/60 flex items-end justify-center">
                            <div className="bg-white w-full max-w-lg rounded-t-3xl p-6 slide-up">
                                <div className="text-center mb-5">
                                    <div className="text-3xl mb-2">✅</div>
                                    <p className="font-bold text-slate-800 text-lg">Marked as delivered!</p>
                                    <p className="text-slate-500 text-sm mt-1">
                                        {stops[proofStop]?.nombre || stops[proofStop]?.name}
                                    </p>
                                </div>

                                <p className="text-center font-semibold text-slate-700 mb-5">
                                    Add proof of delivery?
                                </p>

                                {uploading ? (
                                    <div className="flex flex-col items-center py-6 gap-3">
                                        <div className="loader" />
                                        <p className="text-slate-500 text-sm">Uploading photo…</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <button
                                            onClick={() => fileInputRef.current?.click()}
                                            className="w-full py-4 bg-ess-green active:bg-ess-green text-white font-bold rounded-2xl text-lg flex items-center justify-center gap-3 shadow-md active:scale-95 transition-transform"
                                        >
                                            <Icon name="camera" className="h-6 w-6" />
                                            Take Photo
                                        </button>
                                        <button
                                            onClick={() => setProofStop(null)}
                                            className="w-full py-4 bg-slate-100 active:bg-slate-200 text-slate-600 font-semibold rounded-2xl text-base active:scale-95 transition-transform"
                                        >
                                            Skip
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Sticky header */}
                    <div className="bg-white shadow-sm sticky top-0 z-40">
                        <div className="px-4 pt-4 pb-3">
                            <div className="flex items-center justify-between mb-3">
                                <img
                                    src="https://economysignsupply.com/wp-content/uploads/2024/07/ess-logo-svg-100.svg"
                                    alt="ESS"
                                    className="h-7"
                                />
                                <div className="text-right">
                                    <div className="font-bold text-slate-800 text-sm">{route.driverName}</div>
                                    <div className="text-xs text-slate-400 flex items-center gap-1.5">
                                        <span>{route.zoneName}</span>
                                        {route.trip && (
                                            <span className={`font-bold px-1 py-0.5 rounded text-xs ${route.trip === 'AM' ? 'bg-sky-100 text-sky-700' : 'bg-orange-100 text-orange-700'}`}>
                                                {route.trip}
                                            </span>
                                        )}
                                        <span>· {route.date}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-1.5">
                                <div className="flex justify-between text-xs font-bold">
                                    <span className="text-slate-500">{delivered} of {total} stops delivered</span>
                                    <span className={pct === 100 ? 'text-ess-green' : 'text-ess-blue'}>{pct}%</span>
                                </div>
                                <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div
                                        className="h-full rounded-full transition-all duration-500"
                                        style={{
                                            width: `${pct}%`,
                                            backgroundColor: pct === 100 ? '#74B745' : '#3178A1'
                                        }}
                                    />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* All-done banner */}
                    {allDone && (
                        <div className="mx-4 mt-4 bg-green-50 border border-ess-green/30 rounded-2xl p-6 text-center fade-in">
                            <div className="text-3xl mb-2">🚐</div>
                            <h2 className="text-xl font-bold text-ess-green">Route Complete!</h2>
                            <p className="text-ess-green text-sm mt-1">Great work today, {route.driverName}!</p>
                        </div>
                    )}

                    {/* Stop cards */}
                    <div className="px-4 mt-4 space-y-3">
                        {stops.map((stop, idx) => {
                            const done = stop.delivered;
                            return (
                                <div
                                    key={idx}
                                    className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden transition-all fade-in ${
                                        done ? 'border-ess-green/30' : 'border-slate-200'
                                    }`}
                                >
                                    <div className="p-4">
                                        <div className="flex items-start gap-3">
                                            {/* Stop number / check */}
                                            <div className={`flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm mt-0.5 ${
                                                done
                                                    ? 'bg-ess-green/10 text-ess-green'
                                                    : 'bg-slate-100 text-slate-500'
                                            }`}>
                                                {done ? <Icon name="check" className="h-5 w-5" /> : idx + 1}
                                            </div>

                                            {/* Info */}
                                            <div className="flex-1 min-w-0">
                                                <div className={`font-bold text-base leading-tight ${done ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                                                    {stop.nombre || stop.name}
                                                </div>
                                                <div className="text-sm text-slate-500 mt-0.5 leading-snug">
                                                    {stop.direccion || stop.address}
                                                </div>
                                                {(stop.invoices || stop.pieces) && (
                                                    <div className="flex flex-wrap gap-2 mt-2">
                                                        {stop.invoices && (
                                                            <span className="text-xs bg-yellow-50 text-yellow-700 px-2 py-1 rounded-lg border border-yellow-200 font-mono font-bold">
                                                                INV {stop.invoices}
                                                            </span>
                                                        )}
                                                        {stop.pieces && (
                                                            <span className="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-lg border border-blue-200 font-semibold">
                                                                {stop.pieces} pcs
                                                            </span>
                                                        )}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Proof thumbnail */}
                                            {stop.proofUrl && (
                                                <img
                                                    src={stop.proofUrl}
                                                    alt="proof"
                                                    className="w-14 h-14 rounded-xl object-cover border-2 border-ess-green/30 flex-shrink-0"
                                                />
                                            )}
                                        </div>

                                        {done ? (
                                            <div className="mt-3 pt-3 border-t border-slate-100 flex items-center gap-2 text-xs text-ess-green font-bold">
                                                <Icon name="check-circle" className="h-4 w-4" />
                                                Delivered at {stop.deliveredAt
                                                    ? new Date(stop.deliveredAt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                                                    : '–'}
                                                {!stop.proofUrl && (
                                                    <span className="ml-auto text-slate-400 font-normal">No photo</span>
                                                )}
                                            </div>
                                        ) : (
                                            <button
                                                onClick={() => markDelivered(idx)}
                                                className="mt-4 w-full py-4 bg-ess-green active:bg-ess-green text-white font-bold rounded-xl text-base flex items-center justify-center gap-2 shadow-md active:scale-95 transition-transform"
                                            >
                                                <Icon name="check" className="h-5 w-5" />
                                                Mark as Delivered
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}

                        {stops.length === 0 && (
                            <div className="text-center py-16 text-slate-400">
                                <Icon name="package" className="h-12 w-12 mx-auto mb-3 opacity-30" />
                                <p className="text-sm">No stops assigned to this route.</p>
                            </div>
                        )}
                    </div>
                </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<DriverApp />);
    </script>
</body>
</html>
