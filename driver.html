<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ESS Driver App</title>

    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/63d26f_b22ddda42d0f4dcc8619b741d794ea92~mv2.png">
    <link rel="apple-touch-icon" href="https://static.wixstatic.com/media/63d26f_b22ddda42d0f4dcc8619b741d794ea92~mv2.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ESS Driver">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        window.initFirebaseDriver = (config) => {
            try {
                const app = initializeApp(config, 'driver-app');
                const db = getFirestore(app);
                const storage = getStorage(app);
                const auth = getAuth(app);
                window.fbDb = db;
                window.fbStorage = storage;
                window.fbAuth = auth;
                window.fbDoc = doc;
                window.fbGetDoc = getDoc;
                window.fbOnSnapshot = onSnapshot;
                window.fbSetDoc = setDoc;
                window.fbUpdateDoc = updateDoc;
                window.fbAddDoc = addDoc;
                window.fbCollection = collection;
                window.fbStorageRef = ref;
                window.fbUploadBytes = uploadBytes;
                window.fbGetDownloadURL = getDownloadURL;
                window.fbSignInAnon = () => setPersistence(auth, inMemoryPersistence).then(() => signInAnonymously(auth));
                window.firebaseDriverReady = true;
                return true;
            } catch (e) { console.error("Firebase init error:", e); return false; }
        };
    </script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { ess: { blue: '#3178A1', green: '#74B745', dark: '#0f4c6e' } } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader { border: 3px solid #e2e8f0; border-radius: 50%; border-top-color: #74B745; width: 36px; height: 36px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .slide-up { animation: slideUp 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .shake { animation: shake 0.5s ease-out; }
        @keyframes zoomIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
        .zoom-in { animation: zoomIn 0.2s ease-out; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const AVATAR_COLORS = ['#3178A1','#74B745','#e67e22','#9b59b6','#e74c3c','#1abc9c','#c0392b','#2980b9'];

        const Icon = ({ name, className = "" }) => {
            const [svg, setSvg] = useState(null);
            useEffect(() => {
                if (typeof lucide === 'undefined' || !lucide.icons) return;
                const key = name.split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join('');
                const data = lucide.icons[key] || lucide.icons[name];
                if (data) { const el = lucide.createElement(data); el.setAttribute('class', className); setSvg(el.outerHTML); }
            }, [name, className]);
            if (!svg) return <span className={className} />;
            return <span dangerouslySetInnerHTML={{ __html: svg }} style={{ display: 'contents' }} />;
        };

        const LoadingScreen = ({ msg = 'Loading…' }) => (
            <div className="min-h-screen flex flex-col items-center justify-center bg-white gap-4">
                <div className="loader" />
                <p className="text-slate-500 font-medium text-sm">{msg}</p>
            </div>
        );

        const ErrorScreen = ({ msg }) => (
            <div className="min-h-screen flex flex-col items-center justify-center bg-white p-8 text-center gap-4">
                <div className="text-6xl">⚠️</div>
                <h2 className="text-xl font-bold text-slate-800">Unavailable</h2>
                <p className="text-slate-500 text-sm max-w-xs">{msg}</p>
            </div>
        );

        // ── Shared stop list view ────────────────────────────────────────────────
        function RouteStopList({ route, token, onBack }) {
            const [proofStop, setProofStop] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [lightboxUrl, setLightboxUrl] = useState(null);
            const fileInputRef = useRef(null);
            const [checkingGeo, setCheckingGeo] = useState(null);
            const [outOfRange, setOutOfRange] = useState(new Set());
            const [gpsBlocked, setGpsBlocked] = useState(new Set());

            const haversine = (lat1, lng1, lat2, lng2) => {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };

            const markDelivered = async (idx) => {
                const stop = route.stops[idx];
                if (stop.lat && stop.lng) {
                    setCheckingGeo(idx);
                    try {
                        const pos = await new Promise((resolve, reject) =>
                            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000, enableHighAccuracy: true })
                        );
                        const dist = haversine(pos.coords.latitude, pos.coords.longitude, stop.lat, stop.lng);
                        if (dist > 500) {
                            setOutOfRange(prev => new Set([...prev, idx]));
                            setCheckingGeo(null);
                            return;
                        }
                    } catch(e) {
                        setGpsBlocked(prev => new Set([...prev, idx]));
                        setCheckingGeo(null);
                        return;
                    }
                    setCheckingGeo(null);
                }
                const stops = route.stops.map((s, i) =>
                    i === idx ? { ...s, delivered: true, deliveredAt: new Date().toISOString() } : s
                );
                await window.fbUpdateDoc(window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token), { stops });
                setProofStop(idx);
            };

            const markUndelivered = async (idx) => {
                const stops = route.stops.map((s, i) =>
                    i === idx ? { ...s, delivered: false, deliveredAt: null } : s
                );
                await window.fbUpdateDoc(window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token), { stops });
            };

            const compressImage = (file) => new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    const MAX = 1200;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(resolve, 'image/jpeg', 0.75);
                };
                img.src = url;
            });

            const handlePhotoSelected = async (e) => {
                const file = e.target.files?.[0];
                e.target.value = '';
                const stopIndex = proofStop;
                if (!file || stopIndex === null) return;
                setUploading(true);
                try {
                    const compressed = await compressImage(file);
                    const path = `artifacts/${appId}/proofs/${token}/stop_${stopIndex}_${Date.now()}.jpg`;
                    const sRef = window.fbStorageRef(window.fbStorage, path);
                    await window.fbUploadBytes(sRef, compressed, { contentType: 'image/jpeg' });
                    const photoUrl = await window.fbGetDownloadURL(sRef);
                    const existingUrls = route.stops[stopIndex].proofUrls || (route.stops[stopIndex].proofUrl ? [route.stops[stopIndex].proofUrl] : []);
                    const newUrls = [...existingUrls, photoUrl];
                    const stops = route.stops.map((s, i) =>
                        i === stopIndex ? { ...s, proofUrl: newUrls[0], proofUrls: newUrls, storagePath: path } : s
                    );
                    await window.fbUpdateDoc(window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token), { stops });
                    const stop = route.stops[stopIndex];
                    const invoiceList = (stop.invoices || '').split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
                    await window.fbAddDoc(window.fbCollection(window.fbDb, 'artifacts', appId, 'proof_of_delivery'), {
                        invoices: invoiceList, invoicesRaw: stop.invoices || '',
                        notes: stop.notes || '',
                        customerName: stop.nombre || stop.name || '',
                        stopAddress: stop.direccion || stop.address || '',
                        driverName: route.driverName || '', driverPhone: route.driverPhone || '',
                        date: route.date || new Date().toISOString().split('T')[0],
                        timestamp: Date.now(), photoUrl, photoUrls: newUrls, storagePath: path, routeToken: token,
                        zoneName: route.zoneName || '',
                        expireAt: new Date(Date.now() + 120 * 24 * 60 * 60 * 1000).toISOString()
                    });
                } catch (err) {
                    console.error('Upload error:', err);
                    alert('Could not upload photo.');
                } finally { setUploading(false); setProofStop(null); }
            };

            const stops = route.stops || [];
            const delivered = stops.filter(s => s.delivered).length;
            const total = stops.length;
            const pct = total > 0 ? Math.round((delivered / total) * 100) : 0;
            const allDone = delivered === total && total > 0;
            const proofStopPhotos = proofStop !== null
                ? (stops[proofStop]?.proofUrls || (stops[proofStop]?.proofUrl ? [stops[proofStop].proofUrl] : []))
                : [];

            return (
                <div className="min-h-screen bg-slate-100 pb-12">
                <div className="max-w-lg mx-auto">
                    <input ref={fileInputRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoSelected} />

                    {/* Lightbox */}
                    {lightboxUrl && (
                        <div className="fixed inset-0 z-50 bg-black flex items-center justify-center" onClick={() => setLightboxUrl(null)}>
                            <img src={lightboxUrl} alt="proof" className="max-w-full max-h-full object-contain zoom-in" />
                            <button className="absolute top-4 right-4 text-white bg-black/50 rounded-full p-2">
                                <Icon name="x" className="h-6 w-6" />
                            </button>
                        </div>
                    )}

                    {/* Proof modal */}
                    {proofStop !== null && (
                        <div className="fixed inset-0 z-50 bg-black/60 flex items-end justify-center">
                            <div className="bg-white w-full max-w-lg rounded-t-3xl p-6 slide-up">
                                <div className="text-center mb-5">
                                    <div className="text-3xl mb-2">{proofStopPhotos.length > 0 ? '📷' : '✅'}</div>
                                    <p className="font-bold text-slate-800 text-lg">{proofStopPhotos.length > 0 ? 'Add another photo' : 'Marked as delivered!'}</p>
                                    <p className="text-slate-500 text-sm mt-1">{stops[proofStop]?.nombre || stops[proofStop]?.name}</p>
                                </div>
                                <p className="text-center font-semibold text-slate-700 mb-5">
                                    {proofStopPhotos.length > 0 ? `Photo ${proofStopPhotos.length + 1} of 3` : 'Add proof of delivery?'}
                                </p>
                                {uploading ? (
                                    <div className="flex flex-col items-center py-6 gap-3">
                                        <div className="loader" />
                                        <p className="text-slate-500 text-sm">Uploading photo…</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <button onClick={() => fileInputRef.current?.click()} className="w-full py-4 bg-ess-green text-white font-bold rounded-2xl text-lg flex items-center justify-center gap-3 shadow-md active:scale-95 transition-transform">
                                            <Icon name="camera" className="h-6 w-6" /> Take Photo
                                        </button>
                                        <button onClick={() => setProofStop(null)} className="w-full py-4 bg-slate-100 text-slate-600 font-semibold rounded-2xl text-base active:scale-95 transition-transform">
                                            {proofStopPhotos.length > 0 ? 'Cancel' : 'Skip'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-white shadow-sm sticky top-0 z-40">
                        <div className="px-4 pt-4 pb-3">
                            <div className="flex items-center justify-between mb-3">
                                <div className="flex items-center gap-3">
                                    {onBack && (
                                        <button onClick={onBack} className="p-1.5 rounded-full hover:bg-slate-100 transition-colors">
                                            <Icon name="arrow-left" className="h-5 w-5 text-slate-600" />
                                        </button>
                                    )}
                                    <img src="https://economysignsupply.com/wp-content/uploads/2024/07/ess-logo-svg-100.svg" alt="ESS" className="h-7" />
                                </div>
                                <div className="text-right">
                                    <div className="font-bold text-slate-800 text-sm">{route.driverName}</div>
                                    <div className="text-xs text-slate-400 flex items-center gap-1.5 justify-end">
                                        <span>{route.zoneName}</span>
                                        {route.trip && (
                                            <span className={`font-bold px-1 py-0.5 rounded text-xs ${route.trip === 'AM' ? 'bg-sky-100 text-sky-700' : 'bg-orange-100 text-orange-700'}`}>{route.trip}</span>
                                        )}
                                        <span>· {route.date}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-1.5">
                                <div className="flex justify-between text-xs font-bold">
                                    <span className="text-slate-500">{delivered} of {total} stops delivered</span>
                                    <span className={pct === 100 ? 'text-ess-green' : 'text-ess-blue'}>{pct}%</span>
                                </div>
                                <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, backgroundColor: pct === 100 ? '#74B745' : '#3178A1' }} />
                                </div>
                            </div>
                        </div>
                    </div>

                    {allDone && (
                        <div className="mx-4 mt-4 bg-green-50 border border-ess-green/30 rounded-2xl p-6 text-center fade-in">
                            <div className="text-3xl mb-2">🚐</div>
                            <h2 className="text-xl font-bold text-ess-green">Route Complete!</h2>
                            <p className="text-ess-green text-sm mt-1">Great work today, {route.driverName}!</p>
                            {onBack && <button onClick={onBack} className="mt-4 text-ess-blue text-sm font-bold underline">← Back to my routes</button>}
                        </div>
                    )}

                    <div className="px-4 mt-4 space-y-3">
                        {stops.map((stop, idx) => {
                            const done = stop.delivered;
                            const photos = stop.proofUrls || (stop.proofUrl ? [stop.proofUrl] : []);
                            return (
                                <div key={idx} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden transition-all fade-in ${done ? 'border-ess-green/30' : 'border-slate-200'}`}>
                                    <div className="p-4">
                                        <div className="flex items-start gap-3">
                                            <div className={`flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm mt-0.5 ${done ? 'bg-ess-green/10 text-ess-green' : 'bg-slate-100 text-slate-500'}`}>
                                                {done ? <Icon name="check" className="h-5 w-5" /> : idx + 1}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className={`font-bold text-base leading-tight ${done ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                                                    {stop.nombre || stop.name}
                                                </div>
                                                <div className="text-sm text-slate-500 mt-0.5 leading-snug">{stop.direccion || stop.address}</div>
                                                {(stop.invoices || stop.pieces || stop.notes) && (
                                                    <div className="flex flex-wrap gap-2 mt-2">
                                                        {stop.invoices && <span className="text-xs bg-yellow-50 text-yellow-700 px-2 py-1 rounded-lg border border-yellow-200 font-mono font-bold">INV {stop.invoices}</span>}
                                                        {stop.pieces && <span className="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-lg border border-blue-200 font-semibold">{stop.pieces} pcs</span>}
                                                        {stop.notes && <span className="text-xs bg-orange-50 text-orange-700 px-2 py-1 rounded-lg border border-orange-200 font-semibold">📝 {stop.notes}</span>}
                                                    </div>
                                                )}
                                            </div>
                                            {photos.length > 0 && (
                                                <div className="flex gap-1.5 flex-shrink-0">
                                                    {photos.map((url, pi) => (
                                                        <img key={pi} src={url} alt="proof" onClick={() => setLightboxUrl(url)} className="w-14 h-14 rounded-xl object-cover border-2 border-ess-green/30 cursor-pointer active:scale-95 transition-transform" />
                                                    ))}
                                                    {done && photos.length < 3 && (
                                                        <button onClick={() => setProofStop(idx)} className="w-14 h-14 rounded-xl border-2 border-dashed border-ess-green/40 flex items-center justify-center text-ess-green active:scale-95 transition-transform">
                                                            <Icon name="plus" className="h-5 w-5" />
                                                        </button>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                        {done ? (
                                            <div className="mt-3 pt-3 border-t border-slate-100 flex items-center gap-2 text-xs text-ess-green font-bold">
                                                <Icon name="check-circle" className="h-4 w-4" />
                                                Delivered at {stop.deliveredAt ? new Date(stop.deliveredAt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '–'}
                                                {photos.length === 0 && <span className="text-slate-400 font-normal">No photo</span>}
                                                <button onClick={() => markUndelivered(idx)} className="ml-auto flex items-center gap-1 text-slate-400 hover:text-red-500 font-bold transition-colors px-2 py-1 rounded-lg hover:bg-red-50">
                                                    <Icon name="undo-2" className="h-3.5 w-3.5" /> Undo
                                                </button>
                                            </div>
                                        ) : checkingGeo === idx ? (
                                            <div className="mt-4 w-full py-4 bg-slate-100 text-slate-500 font-bold rounded-xl text-base flex items-center justify-center gap-2">
                                                <div className="w-4 h-4 border-2 border-slate-400 border-t-transparent rounded-full animate-spin" /> Getting location…
                                            </div>
                                        ) : gpsBlocked.has(idx) ? (
                                            <button onClick={() => markDelivered(idx)} className="mt-4 w-full py-4 bg-red-100 text-red-600 font-bold rounded-xl text-base flex items-center justify-center gap-2 border border-red-200 active:scale-95 transition-transform">
                                                <Icon name="map-pin-off" className="h-5 w-5" /> Enable GPS and try again
                                            </button>
                                        ) : outOfRange.has(idx) ? (
                                            <div className="mt-4 w-full py-4 bg-orange-100 text-orange-700 font-bold rounded-xl text-base flex items-center justify-center gap-2 border border-orange-200">
                                                <Icon name="map-pin-off" className="h-5 w-5" /> Out of range — Contact sales
                                            </div>
                                        ) : (
                                            <button onClick={() => markDelivered(idx)} className="mt-4 w-full py-4 bg-ess-green text-white font-bold rounded-xl text-base flex items-center justify-center gap-2 shadow-md active:scale-95 transition-transform">
                                                <Icon name="check" className="h-5 w-5" /> Mark as Delivered
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                        {stops.length === 0 && (
                            <div className="text-center py-16 text-slate-400">
                                <Icon name="package" className="h-12 w-12 mx-auto mb-3 opacity-30" />
                                <p className="text-sm">No stops assigned.</p>
                            </div>
                        )}
                    </div>
                </div>
                </div>
            );
        }

        // ── Direct token flow (legacy / WhatsApp link) ───────────────────────────
        function TokenRouteApp({ token }) {
            const [phase, setPhase] = useState('loading');
            const [route, setRoute] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const unsubRef = useRef(null);

            useEffect(() => {
                let cancelled = false;
                const init = async () => {
                    try {
                        const res = await fetch('/config');
                        const cfg = await res.json();
                        if (!cfg.firebaseConfig) throw new Error('Firebase config unavailable');
                        window.initFirebaseDriver(cfg.firebaseConfig);
                        await new Promise(r => { const t = setInterval(() => { if (window.firebaseDriverReady) { clearInterval(t); r(); } }, 80); });
                        await window.fbSignInAnon();
                        const docRef = window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token);
                        unsubRef.current = window.fbOnSnapshot(docRef, snap => {
                            if (cancelled) return;
                            if (!snap.exists()) { setErrorMsg('Route not found or link expired.'); setPhase('error'); return; }
                            setRoute(snap.data());
                            setPhase('ready');
                        }, err => { if (!cancelled) { setErrorMsg(err.message); setPhase('error'); } });
                    } catch (e) { if (!cancelled) { setErrorMsg(e.message); setPhase('error'); } }
                };
                init();
                return () => { cancelled = true; unsubRef.current?.(); };
            }, [token]);

            if (phase === 'loading') return <LoadingScreen msg="Loading your route…" />;
            if (phase === 'error') return <ErrorScreen msg={errorMsg || 'Route unavailable.'} />;
            if (!route) return null;
            return <RouteStopList route={route} token={token} onBack={null} />;
        }

        // ── Company app (profile picker → PIN → routes → detail) ─────────────────
        function CompanyApp({ companyUid }) {
            const lsKey = `ess_driver_${companyUid}`;
            const [screen, setScreen] = useState('loading');
            const [errorMsg, setErrorMsg] = useState('');
            const [drivers, setDrivers] = useState([]);
            const [selectedDriver, setSelectedDriver] = useState(null);
            const [pinDigits, setPinDigits] = useState('');
            const [pinShake, setPinShake] = useState(false);
            const pinRef = useRef('');
            const newPinARef = useRef('');
            const newPinBRef = useRef('');
            const [routes, setRoutes] = useState([]);
            const [detailToken, setDetailToken] = useState(null);
            const [detailRoute, setDetailRoute] = useState(null);
            const [showMenu, setShowMenu] = useState(false);
            const [changingPin, setChangingPin] = useState(false);
            const [newPinStep, setNewPinStep] = useState(1); // 1=enter new, 2=confirm
            const [newPinA, setNewPinA] = useState('');
            const [newPinB, setNewPinB] = useState('');
            const [pinChangeShake, setPinChangeShake] = useState(false);
            const [pinChangeDone, setPinChangeDone] = useState(false);
            const unsubRoutes = useRef(null);
            const unsubDetail = useRef(null);

            // Init: Firebase + load driver list
            useEffect(() => {
                const init = async () => {
                    try {
                        const res = await fetch('/config');
                        const cfg = await res.json();
                        if (!cfg.firebaseConfig) throw new Error('Missing config');
                        window.initFirebaseDriver(cfg.firebaseConfig);
                        await new Promise(r => { const t = setInterval(() => { if (window.firebaseDriverReady) { clearInterval(t); r(); } }, 80); });
                        await window.fbSignInAnon();

                        const snap = await window.fbGetDoc(window.fbDoc(window.fbDb, 'artifacts', appId, 'driver_access', companyUid));
                        if (!snap.exists() || !(snap.data().drivers || []).length) {
                            setErrorMsg('No drivers found. Ask your dispatcher to set up the Driver App.');
                            setScreen('error'); return;
                        }
                        const driverList = snap.data().drivers || [];
                        setDrivers(driverList);

                        // Restore saved driver session
                        try {
                            const saved = JSON.parse(localStorage.getItem(lsKey));
                            if (saved && driverList.some(d => d.id === saved.id)) {
                                setSelectedDriver(saved);
                                setScreen('pin');
                                return;
                            }
                        } catch {}
                        setScreen('picker');
                    } catch (e) {
                        setErrorMsg(e.message || 'Could not load app. Check your connection.');
                        setScreen('error');
                    }
                };
                init();
                return () => { unsubRoutes.current?.(); unsubDetail.current?.(); };
            }, []);

            const pickDriver = (driver) => {
                pinRef.current = '';
                setSelectedDriver(driver);
                setPinDigits('');
                setPinShake(false);
                setScreen('pin');
            };

            const handlePin = (d) => {
                if (pinRef.current.length >= 4) return;
                const next = pinRef.current + d;
                pinRef.current = next;
                setPinDigits(next);
                if (next.length === 4) {
                    if (next === (selectedDriver.pin || '0000')) {
                        localStorage.setItem(lsKey, JSON.stringify(selectedDriver));
                        pinRef.current = '';
                        setPinDigits('');
                        subscribeRoutes(selectedDriver);
                        setScreen('routes');
                    } else {
                        setPinShake(true);
                        setTimeout(() => { pinRef.current = ''; setPinDigits(''); setPinShake(false); }, 800);
                    }
                }
            };

            const subscribeRoutes = (driver) => {
                unsubRoutes.current?.();
                const col = window.fbCollection(window.fbDb, 'artifacts', appId, 'active_routes');
                unsubRoutes.current = window.fbOnSnapshot(col, snap => {
                    const all = snap.docs.map(d => ({ token: d.id, ...d.data() }));
                    const mine = all.filter(r => r.dispatcherUid === companyUid && r.driverName === driver.name);
                    mine.sort((a, b) => {
                        if (b.date !== a.date) return b.date.localeCompare(a.date);
                        return a.trip === 'AM' ? -1 : 1;
                    });
                    setRoutes(mine);
                });
            };

            const openRoute = (token) => {
                setDetailToken(token);
                unsubDetail.current?.();
                const docRef = window.fbDoc(window.fbDb, 'artifacts', appId, 'active_routes', token);
                unsubDetail.current = window.fbOnSnapshot(docRef, snap => {
                    if (snap.exists()) setDetailRoute(snap.data());
                });
                setScreen('detail');
            };

            const logout = () => {
                localStorage.removeItem(lsKey);
                unsubRoutes.current?.();
                unsubDetail.current?.();
                pinRef.current = '';
                setSelectedDriver(null);
                setRoutes([]);
                setDetailRoute(null);
                setShowMenu(false);
                setScreen('picker');
            };

            const startChangePin = () => {
                setShowMenu(false);
                newPinARef.current = '';
                newPinBRef.current = '';
                setNewPinStep(1);
                setNewPinA('');
                setNewPinB('');
                setPinChangeShake(false);
                setPinChangeDone(false);
                setChangingPin(true);
            };

            const handleNewPinDigit = async (d) => {
                if (newPinStep === 1) {
                    const next = newPinARef.current + d;
                    newPinARef.current = next;
                    setNewPinA(next);
                    if (next.length === 4) {
                        setTimeout(() => { setNewPinStep(2); newPinBRef.current = ''; setNewPinB(''); }, 300);
                    }
                } else {
                    const next = newPinBRef.current + d;
                    newPinBRef.current = next;
                    setNewPinB(next);
                    if (next.length === 4) {
                        if (next === newPinARef.current) {
                            // Save new PIN
                            try {
                                const docRef = window.fbDoc(window.fbDb, 'artifacts', appId, 'driver_access', companyUid);
                                const snap = await window.fbGetDoc(docRef);
                                if (snap.exists()) {
                                    const updated = (snap.data().drivers || []).map(dr =>
                                        dr.id === selectedDriver.id ? { ...dr, pin: next } : dr
                                    );
                                    await window.fbSetDoc(docRef, { drivers: updated });
                                    const updatedDriver = { ...selectedDriver, pin: next };
                                    setSelectedDriver(updatedDriver);
                                    localStorage.setItem(lsKey, JSON.stringify(updatedDriver));
                                }
                                setPinChangeDone(true);
                                setTimeout(() => setChangingPin(false), 1500);
                            } catch (e) {
                                console.error('PIN save error:', e);
                                alert('Could not save PIN. Try again.');
                                setChangingPin(false);
                            }
                        } else {
                            setPinChangeShake(true);
                            setTimeout(() => { newPinARef.current = ''; newPinBRef.current = ''; setNewPinA(''); setNewPinB(''); setNewPinStep(1); setPinChangeShake(false); }, 800);
                        }
                    }
                }
            };

            // ── Screens ──

            if (screen === 'loading') return <LoadingScreen msg="Loading driver app…" />;
            if (screen === 'error') return <ErrorScreen msg={errorMsg} />;

            if (screen === 'detail' && detailRoute) {
                return <RouteStopList route={detailRoute} token={detailToken} onBack={() => { unsubDetail.current?.(); setDetailRoute(null); setScreen('routes'); }} />;
            }

            if (screen === 'picker') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 flex flex-col">
                        <div className="flex flex-col items-center pt-16 pb-8 px-6 flex-1">
                            <img src="https://economysignsupply.com/wp-content/uploads/2024/07/ess-logo-svg-100.svg" alt="ESS" className="h-12 mb-10" />
                            <h1 className="text-xs font-black tracking-[0.25em] text-slate-400 uppercase mb-10">Who are you?</h1>

                            <div className="grid grid-cols-3 gap-5 w-full max-w-xs fade-in">
                                {drivers.map((driver, i) => {
                                    const initials = driver.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
                                    const color = driver.color || AVATAR_COLORS[i % AVATAR_COLORS.length];
                                    return (
                                        <button key={driver.id} onClick={() => pickDriver(driver)} className="flex flex-col items-center gap-2 group">
                                            <div className="w-20 h-20 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-lg group-active:scale-95 transition-transform"
                                                style={{ backgroundColor: color }}>
                                                {initials}
                                            </div>
                                            <span className="text-xs font-bold text-slate-600 text-center leading-tight">{driver.name.split(' ')[0].toUpperCase()}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }

            if (screen === 'pin') {
                const initials = (selectedDriver?.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
                const color = selectedDriver?.color || AVATAR_COLORS[0];
                return (
                    <div className="min-h-screen bg-ess-dark flex flex-col items-center justify-between py-12 px-6">
                        <button onClick={() => { setScreen('picker'); setPinDigits(''); }} className="self-start text-white/50 hover:text-white flex items-center gap-1 text-sm">
                            <Icon name="arrow-left" className="h-4 w-4" /> Back
                        </button>

                        <div className="flex flex-col items-center gap-6">
                            <div className="w-20 h-20 rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-xl" style={{ backgroundColor: color }}>
                                {initials}
                            </div>
                            <div>
                                <p className="text-white font-bold text-xl text-center">{selectedDriver?.name}</p>
                                <p className="text-white/50 text-sm text-center mt-1">Enter your PIN</p>
                            </div>

                            {/* Dots */}
                            <div className={`flex gap-4 ${pinShake ? 'shake' : ''}`}>
                                {[0,1,2,3].map(i => (
                                    <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all ${i < pinDigits.length ? 'bg-ess-green border-ess-green' : 'border-white/40 bg-transparent'}`} />
                                ))}
                            </div>
                        </div>

                        {/* Keypad */}
                        <div className="grid grid-cols-3 gap-3 w-full max-w-xs">
                            {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k, i) => (
                                k === '' ? <div key={i} /> :
                                <button key={i} onClick={() => k === '⌫' ? setPinDigits(p => p.slice(0,-1)) : handlePin(k)}
                                    className="h-16 rounded-2xl bg-white/10 hover:bg-white/20 text-white text-2xl font-bold active:scale-95 transition-all">
                                    {k}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // Change PIN modal
            if (changingPin) {
                const currentDigits = newPinStep === 1 ? newPinA : newPinB;
                return (
                    <div className="min-h-screen bg-ess-dark flex flex-col items-center justify-between py-12 px-6">
                        <button onClick={() => setChangingPin(false)} className="self-start text-white/50 hover:text-white flex items-center gap-1 text-sm">
                            <Icon name="arrow-left" className="h-4 w-4" /> Cancel
                        </button>

                        <div className="flex flex-col items-center gap-6">
                            {pinChangeDone ? (
                                <>
                                    <div className="text-5xl">✅</div>
                                    <p className="text-white font-bold text-xl">PIN updated!</p>
                                </>
                            ) : (
                                <>
                                    <div className="w-16 h-16 rounded-2xl flex items-center justify-center" style={{ backgroundColor: selectedDriver?.color || AVATAR_COLORS[0] }}>
                                        <Icon name="lock" className="h-7 w-7 text-white" />
                                    </div>
                                    <div className="text-center">
                                        <p className="text-white font-bold text-xl">
                                            {newPinStep === 1 ? 'Enter new PIN' : 'Confirm new PIN'}
                                        </p>
                                        <p className="text-white/50 text-sm mt-1">{selectedDriver?.name}</p>
                                    </div>
                                    <div className={`flex gap-4 ${pinChangeShake ? 'shake' : ''}`}>
                                        {[0,1,2,3].map(i => (
                                            <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all ${i < currentDigits.length ? 'bg-ess-green border-ess-green' : 'border-white/40 bg-transparent'}`} />
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>

                        {!pinChangeDone && (
                            <div className="grid grid-cols-3 gap-3 w-full max-w-xs">
                                {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k, i) => (
                                    k === '' ? <div key={i} /> :
                                    <button key={i} onClick={() => k === '⌫'
                                        ? (newPinStep === 1 ? setNewPinA(p => p.slice(0,-1)) : setNewPinB(p => p.slice(0,-1)))
                                        : handleNewPinDigit(k)}
                                        className="h-16 rounded-2xl bg-white/10 hover:bg-white/20 text-white text-2xl font-bold active:scale-95 transition-all">
                                        {k}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            // Routes list screen
            const today = new Date().toISOString().split('T')[0];
            const todayRoutes = routes.filter(r => r.date === today);
            const otherRoutes = routes.filter(r => r.date !== today);
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
            const initials = (selectedDriver?.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
            const color = selectedDriver?.color || AVATAR_COLORS[0];

            const RouteCard = ({ r, faded }) => {
                const stops = r.stops || [];
                const delivered = stops.filter(s => s.delivered).length;
                const total = stops.length;
                const pct = total > 0 ? Math.round((delivered / total) * 100) : 0;
                const done = delivered === total && total > 0;
                const [showGpsModal, setShowGpsModal] = useState(false);
                const appleLink = r.appleLink || (stops.length > 0
                    ? `https://maps.apple.com/?${stops.map(s => `daddr=${encodeURIComponent(s.direccion || s.nombre || '')}`).join('&')}&dirflg=d`
                    : null);
                const hasGps = !!(r.link || appleLink);
                return (
                    <div className={`bg-white rounded-2xl shadow-sm border p-4 fade-in ${faded ? 'border-slate-100 opacity-60' : 'border-slate-200'}`}>
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                                <span className={`font-black text-base ${faded ? 'line-through text-slate-400' : 'text-slate-800'}`}>{r.zoneName}</span>
                                {r.trip && <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${r.trip === 'AM' ? 'bg-sky-100 text-sky-700' : 'bg-orange-100 text-orange-700'}`}>{r.trip}</span>}
                                {done && <span className="text-xs font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700">✓ Done</span>}
                            </div>
                            <span className={`text-xs ${faded ? 'line-through text-slate-300' : 'text-slate-400'}`}>{r.date}</span>
                        </div>

                        <div className="space-y-1.5 mb-3">
                            <div className="flex justify-between text-xs font-bold">
                                <span className="text-slate-500">{delivered}/{total} stops</span>
                                <span className={pct === 100 ? 'text-ess-green' : 'text-ess-blue'}>{pct}%</span>
                            </div>
                            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, backgroundColor: pct === 100 ? '#74B745' : '#3178A1' }} />
                            </div>
                        </div>

                        <div className="flex gap-2">
                            {hasGps && (
                                <button onClick={() => setShowGpsModal(true)}
                                    className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl text-sm flex items-center justify-center gap-1.5 transition-colors">
                                    <Icon name="map-pin" className="h-4 w-4 text-ess-blue" /> GPS
                                </button>
                            )}
                            <button onClick={() => openRoute(r.token)}
                                className="flex-1 py-2.5 bg-ess-blue text-white font-bold rounded-xl text-sm flex items-center justify-center gap-1.5 active:scale-95 transition-transform">
                                <Icon name="list-checks" className="h-4 w-4" /> My Stops
                            </button>
                        </div>

                        {/* GPS picker modal */}
                        {showGpsModal && (
                            <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/40" onClick={() => setShowGpsModal(false)}>
                                <div className="bg-white w-full max-w-sm rounded-t-3xl p-6 slide-up" onClick={e => e.stopPropagation()}>
                                    <div className="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-5" />
                                    <p className="text-center font-black text-slate-700 text-base mb-4">Open with...</p>
                                    <div className="space-y-3">
                                        {r.link && (
                                            <a href={r.link} target="_blank" rel="noopener noreferrer" onClick={() => setShowGpsModal(false)}
                                                className="flex items-center gap-4 p-4 rounded-2xl border border-slate-200 hover:bg-slate-50 active:scale-95 transition-all">
                                                <div className="w-11 h-11 rounded-xl bg-blue-50 flex items-center justify-center flex-shrink-0">
                                                    <Icon name="map" className="h-5 w-5 text-blue-600" />
                                                </div>
                                                <div>
                                                    <p className="font-bold text-slate-800">Google Maps</p>
                                                    <p className="text-xs text-slate-400">Android & iOS</p>
                                                </div>
                                                <Icon name="chevron-right" className="h-4 w-4 text-slate-300 ml-auto" />
                                            </a>
                                        )}
                                        {appleLink && (
                                            <a href={appleLink} target="_blank" rel="noopener noreferrer" onClick={() => setShowGpsModal(false)}
                                                className="flex items-center gap-4 p-4 rounded-2xl border border-slate-200 hover:bg-slate-50 active:scale-95 transition-all">
                                                <div className="w-11 h-11 rounded-xl bg-slate-100 flex items-center justify-center flex-shrink-0">
                                                    <Icon name="navigation" className="h-5 w-5 text-slate-700" />
                                                </div>
                                                <div>
                                                    <p className="font-bold text-slate-800">Apple Maps</p>
                                                    <p className="text-xs text-slate-400">iPhone & iPad only</p>
                                                </div>
                                                <Icon name="chevron-right" className="h-4 w-4 text-slate-300 ml-auto" />
                                            </a>
                                        )}
                                    </div>
                                    <button onClick={() => setShowGpsModal(false)} className="w-full mt-4 py-3 text-slate-400 font-bold text-sm">Cancel</button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-100 pb-12">
                <div className="max-w-lg mx-auto">
                    {/* Header */}
                    <div className="bg-ess-dark px-4 pt-10 pb-6 relative">
                        <div className="flex items-center justify-between">
                            <div>
                                <p className="text-white/60 text-sm">{greeting},</p>
                                <p className="text-white font-black text-2xl">{selectedDriver?.name?.split(' ')[0]}</p>
                            </div>
                            <button onClick={() => setShowMenu(m => !m)} className="w-11 h-11 rounded-2xl flex items-center justify-center text-white text-lg font-black shadow-lg" style={{ backgroundColor: color }}>
                                {initials}
                            </button>
                        </div>
                        {showMenu && (
                            <div className="absolute right-4 top-full mt-1 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden z-50 w-48 fade-in">
                                <button onClick={startChangePin} className="w-full flex items-center gap-3 px-4 py-3 text-slate-700 hover:bg-slate-50 font-semibold text-sm">
                                    <Icon name="lock" className="h-4 w-4 text-ess-blue" /> Change PIN
                                </button>
                                <div className="h-px bg-slate-100" />
                                <button onClick={logout} className="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 font-semibold text-sm">
                                    <Icon name="log-out" className="h-4 w-4" /> Log out
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="px-4 pt-5 space-y-5">
                        {todayRoutes.length > 0 && (
                            <div>
                                <p className="text-xs font-black text-slate-400 uppercase tracking-wider mb-3">Today's Routes</p>
                                <div className="space-y-3">{todayRoutes.map(r => <RouteCard key={r.token} r={r} />)}</div>
                            </div>
                        )}

                        {otherRoutes.length > 0 && (
                            <div>
                                <p className="text-xs font-black text-slate-400 uppercase tracking-wider mb-3">Other Routes</p>
                                <div className="space-y-3">{otherRoutes.map(r => <RouteCard key={r.token} r={r} faded />)}</div>
                            </div>
                        )}

                        {routes.length === 0 && (
                            <div className="text-center py-20 text-slate-400 fade-in">
                                <Icon name="package" className="h-14 w-14 mx-auto mb-4 opacity-20" />
                                <p className="font-bold text-slate-500">No active routes</p>
                                <p className="text-sm mt-1">Your dispatcher hasn't sent any routes yet.</p>
                            </div>
                        )}
                    </div>
                </div>
                </div>
            );
        }

        // ── Router ────────────────────────────────────────────────────────────────
        function DriverApp() {
            const params = new URLSearchParams(window.location.search);
            const directToken = params.get('r');
            const companyUid = params.get('company');
            if (directToken) return <TokenRouteApp token={directToken} />;
            if (companyUid) return <CompanyApp companyUid={companyUid} />;
            return <ErrorScreen msg="Invalid or missing link. Contact your dispatcher." />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<DriverApp />);
    </script>
</body>
</html>
