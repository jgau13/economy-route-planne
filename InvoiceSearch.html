<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice History - ESS</title>
    
    <!-- Favicon and Apple Touch Icon -->
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/63d26f_b22ddda42d0f4dcc8619b741d794ea92~mv2.png">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- FIREBASE SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy, limit, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.initializeFirebaseGlobally = (config) => {
            try {
                const app = initializeApp(config);
                window.fbAuth = getAuth(app);
                window.fbDb = getFirestore(app);
                window.fbSignIn = signInWithEmailAndPassword;
                window.fbSignOut = signOut;
                window.fbOnAuthStateChanged = onAuthStateChanged;
                window.fbCollection = collection;
                window.fbQuery = query;
                window.fbWhere = where;
                window.fbGetDocs = getDocs;
                window.fbOrderBy = orderBy;
                window.fbLimit = limit;
                window.fbGetDoc = getDoc;
                window.fbDoc = doc;
                return true;
            } catch (e) {
                console.error(e);
                return false;
            }
        };
    </script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { ess: { blue: '#1b6e9b', green: '#6bbf5d' } } } }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const Icon = ({ name, className = "" }) => {
            const [svgHtml, setSvgHtml] = useState(null);
            useEffect(() => {
                if (typeof lucide === 'undefined' || !lucide.icons) return;
                const iconName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                const iconData = lucide.icons[iconName] || lucide.icons[name];
                if (iconData) { const el = lucide.createElement(iconData); el.setAttribute('class', className); setSvgHtml(el.outerHTML); }
            }, [name, className]);
            if (!svgHtml) return <span className={className}></span>;
            return <span dangerouslySetInnerHTML={{ __html: svgHtml }} style={{ display: 'contents' }} />;
        };

        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true); setError('');
                try { await window.fbSignIn(window.fbAuth, email, password); } 
                catch (err) { console.error(err); setError("Access Denied."); setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
                        <div className="text-center mb-8">
                            <img src="https://economysignsupply.com/wp-content/uploads/2024/07/ess-logo-svg-100.svg" alt="ESS" className="h-16 mx-auto mb-4"/>
                            <h1 className="text-2xl font-bold text-ess-blue">Invoice Search</h1>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" required className="w-full p-3 border rounded-lg" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required className="w-full p-3 border rounded-lg" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} />
                            {error && <div className="text-red-600 text-sm font-bold">{error}</div>}
                            <button type="submit" disabled={loading} className="w-full bg-ess-blue text-white py-3 rounded-lg font-bold hover:bg-sky-700">{loading ? "..." : "Sign In"}</button>
                        </form>
                    </div>
                </div>
            );
        };

        const PhotoModal = ({ url, onClose }) => (
            <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={onClose}>
                <div className="relative max-w-lg w-full">
                    <img src={url} alt="Proof of delivery" className="w-full rounded-xl shadow-2xl" />
                    <button onClick={onClose} className="absolute top-3 right-3 bg-black/50 text-white rounded-full p-2 hover:bg-black/70">
                        <Icon name="x" className="h-5 w-5" />
                    </button>
                    <p className="text-center text-white/60 text-xs mt-3">Tap anywhere to close</p>
                </div>
            </div>
        );

        const ProofModal = ({ hit, onClose }) => {
            const [proof, setProof] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [photoOpen, setPhotoOpen] = React.useState(false);

            React.useEffect(() => {
                const search = async () => {
                    try {
                        const invoices = (hit.invoices || '').split(/[^a-z0-9]+/i).filter(Boolean);
                        const col = window.fbCollection(window.fbDb, 'artifacts', 'default-app-id', 'proof_of_delivery');
                        let found = null;
                        for (const inv of invoices) {
                            const q = window.fbQuery(col,
                                window.fbWhere('invoices', 'array-contains', inv),
                                window.fbLimit(1)
                            );
                            const snap = await window.fbGetDocs(q);
                            if (!snap.empty) { found = { id: snap.docs[0].id, ...snap.docs[0].data() }; break; }
                        }
                        if (!found) {
                            // fallback: search by customerName + date
                            const dateStr = hit.date; // e.g. "7/14/2026"
                            const q2 = window.fbQuery(col, window.fbWhere('customerName', '==', hit.client), window.fbLimit(5));
                            const snap2 = await window.fbGetDocs(q2);
                            if (!snap2.empty) found = { id: snap2.docs[0].id, ...snap2.docs[0].data() };
                        }
                        setProof(found);
                    } catch(e) { console.error(e); }
                    setLoading(false);
                };
                search();
            }, []);

            return (
                <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
                    {photoOpen && proof?.photoUrl && <PhotoModal url={proof.photoUrl} onClose={() => setPhotoOpen(false)} />}
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                            <div>
                                <h2 className="font-bold text-slate-800">{hit.client}</h2>
                                <p className="text-xs text-slate-400">{hit.address}</p>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-red-500 p-1"><Icon name="x" className="h-5 w-5" /></button>
                        </div>
                        <div className="p-5">
                            {loading && <div className="flex justify-center py-8"><div className="border-2 border-slate-200 border-t-ess-blue rounded-full w-8 h-8 animate-spin" /></div>}
                            {!loading && !proof && (
                                <div className="text-center py-8 text-slate-400">
                                    <Icon name="camera-off" className="h-10 w-10 mx-auto mb-2 opacity-30" />
                                    <p className="text-sm font-medium">No proof of delivery found for this invoice.</p>
                                </div>
                            )}
                            {!loading && proof && (
                                <div className="space-y-4">
                                    {proof.photoUrl ? (
                                        <button onClick={() => setPhotoOpen(true)} className="w-full group relative overflow-hidden rounded-xl border-2 border-slate-200 hover:border-ess-blue transition-colors">
                                            <img src={proof.photoUrl} alt="proof" className="w-full object-cover max-h-64" />
                                            <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                                                <div className="opacity-0 group-hover:opacity-100 bg-white rounded-full p-2 shadow-lg transition-opacity">
                                                    <Icon name="zoom-in" className="h-5 w-5 text-ess-blue" />
                                                </div>
                                            </div>
                                        </button>
                                    ) : (
                                        <div className="w-full h-32 rounded-xl bg-slate-100 flex items-center justify-center border-2 border-dashed border-slate-200">
                                            <Icon name="camera-off" className="h-8 w-8 text-slate-300" />
                                        </div>
                                    )}
                                    <div className="grid grid-cols-3 gap-3 text-xs">
                                        <div><span className="text-slate-400 font-bold uppercase block mb-0.5">Date</span><span className="font-bold text-slate-700">{proof.date}</span></div>
                                        <div><span className="text-slate-400 font-bold uppercase block mb-0.5">Driver</span><span className="font-bold text-green-600">{proof.driverName || '–'}</span></div>
                                        <div><span className="text-slate-400 font-bold uppercase block mb-0.5">Zone</span><span className="font-bold text-slate-700">{proof.zoneName || '–'}</span></div>
                                    </div>
                                    {proof.notes && <div className="bg-orange-50 rounded-lg px-3 py-2 text-xs text-orange-700"><span className="font-bold">Notes: </span>{proof.notes}</div>}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const InvoiceSearchApp = () => {
            const [user, setUser] = useState(null);
            const [initializing, setInitializing] = useState(true);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [results, setResults] = useState([]);
            const [plans, setPlans] = useState([]);
            const [drivers, setDrivers] = useState({});

            // Proof of delivery tab
            const [activeTab, setActiveTab] = useState('history');
            const [proofTerm, setProofTerm] = useState('');
            const [proofDateFrom, setProofDateFrom] = useState('');
            const [proofDateTo, setProofDateTo] = useState('');
            const [proofResults, setProofResults] = useState([]);
            const [proofLoading, setProofLoading] = useState(false);
            const [proofSearched, setProofSearched] = useState(false);
            const [photoModal, setPhotoModal] = useState(null);
            const [proofModalHit, setProofModalHit] = useState(null);
            
            // Initial Config Load & Auth Check
            useEffect(() => {
                const init = async () => {
                    const response = await fetch('/config');
                    const data = await response.json();
                    if (data.firebaseConfig) window.initializeFirebaseGlobally(data.firebaseConfig);
                    
                    window.fbOnAuthStateChanged(window.fbAuth, u => {
                        setUser(u);
                        setInitializing(false); // Auth check done
                        if(u) loadData(u.uid);
                    });
                };
                init();
            }, []);

            const loadData = async (uid) => {
                setLoading(true);
                const sixWeeksAgo = Date.now() - (6 * 7 * 24 * 60 * 60 * 1000);
                
                try {
                    // 1. Fetch Drivers map for name resolution
                    const driversSnap = await window.fbGetDocs(window.fbCollection(window.fbDb, 'artifacts', appId, 'users', uid, 'drivers'));
                    const driverMap = {};
                    driversSnap.forEach(doc => driverMap[doc.id] = doc.data().name);
                    setDrivers(driverMap);

                    // 2. Fetch Last 100 Plans (Simple fetch to avoid index errors, then filter in memory)
                    const plansRef = window.fbCollection(window.fbDb, 'artifacts', appId, 'users', uid, 'saved_plans');
                    // Use simple orderBy without where to avoid complex index requirements
                    const q = window.fbQuery(plansRef, window.fbOrderBy("createdAt", "desc"), window.fbLimit(100));
                    
                    const querySnapshot = await window.fbGetDocs(q);
                    
                    const loadedPlans = [];
                    querySnapshot.forEach(doc => {
                        const d = doc.data();
                        // Manual filtering for last 6 weeks
                        if (d.createdAt > sixWeeksAgo) {
                            loadedPlans.push({id: doc.id, ...d});
                        }
                    });
                    setPlans(loadedPlans);
                } catch(e) {
                    console.error("Error loading history:", e);
                } finally {
                    setLoading(false);
                }
            };

            const handleSearch = () => {
                if(!searchTerm.trim()) return;
                const term = searchTerm.toLowerCase().trim();
                const hits = [];

                plans.forEach(plan => {
                    const dateStr = new Date(plan.createdAt).toLocaleDateString();
                    const assignments = plan.driverAssignments || {};
                    
                    if (plan.optimizedRoutes) {
                        Object.entries(plan.optimizedRoutes).forEach(([zoneName, routeData]) => {
                            if (routeData.paradas) {
                                routeData.paradas.forEach(stop => {
                                    const rawInvoices = (stop.invoices || "").toLowerCase();
                                    const clientName = (stop.nombre || stop.name || "").toLowerCase();
                                    const address = (stop.direccion || stop.address || "").toLowerCase();
                                    
                                    // Smart Search Logic
                                    let match = false;

                                    // 1. Check client/address match (standard substring)
                                    if (clientName.includes(term) || address.includes(term)) {
                                        match = true;
                                    } else {
                                        // 2. Check Invoice Tokens
                                        // Split invoice string by non-alphanumeric chars (space, comma, dot, dash, etc.)
                                        const invoiceTokens = rawInvoices.split(/[^a-z0-9]+/).filter(Boolean);
                                        
                                        // If user typed a number, check for exact token match or substring if partial
                                        // Assuming user wants robust find:
                                        if (rawInvoices.includes(term)) match = true;
                                    }
                                    
                                    if (match) {
                                        const driverId = assignments[zoneName];
                                        const driverName = drivers[driverId] || "Unassigned";
                                        
                                        hits.push({
                                            date: dateStr,
                                            planName: plan.name,
                                            driver: driverName,
                                            client: stop.nombre || stop.name,
                                            address: stop.direccion || stop.address,
                                            invoices: stop.invoices,
                                            zone: zoneName
                                        });
                                    }
                                });
                            }
                        });
                    }
                });
                setResults(hits);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') handleSearch();
            };

            const searchProofs = async () => {
                if (!proofTerm.trim() && !proofDateFrom && !proofDateTo) return;
                setProofLoading(true);
                setProofSearched(true);
                try {
                    const col = window.fbCollection(window.fbDb, 'artifacts', appId, 'proof_of_delivery');
                    const term = proofTerm.trim().toLowerCase();

                    // Always fetch by date range (or last 300 docs) and filter client-side
                    // This supports invoice #, customer name, and address search uniformly
                    const constraints = [];
                    if (proofDateFrom) constraints.push(window.fbWhere('date', '>=', proofDateFrom));
                    if (proofDateTo)   constraints.push(window.fbWhere('date', '<=', proofDateTo));
                    const q = window.fbQuery(col, ...constraints, window.fbOrderBy('date', 'desc'), window.fbLimit(300));

                    const snap = await window.fbGetDocs(q);
                    let docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                    // Client-side filter by term (invoice, name, or address)
                    if (term) {
                        docs = docs.filter(d => {
                            const invoiceMatch = (d.invoicesRaw || '').toLowerCase().includes(term) ||
                                (d.invoices || []).some(inv => inv.toLowerCase().includes(term));
                            const nameMatch = (d.customerName || '').toLowerCase().includes(term);
                            const addressMatch = (d.stopAddress || '').toLowerCase().includes(term);
                            return invoiceMatch || nameMatch || addressMatch;
                        });
                    }

                    docs.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    setProofResults(docs);
                } catch (e) {
                    console.error('Proof search error:', e);
                    alert('Search error: ' + e.message);
                } finally {
                    setProofLoading(false);
                }
            };

            const handleProofKeyDown = (e) => {
                if (e.key === 'Enter') searchProofs();
            };

            if (initializing) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="loader border-4 border-slate-200 border-t-ess-blue rounded-full w-12 h-12 animate-spin"></div>
                    </div>
                );
            }

            if (!user) return <LoginScreen />;

            return (
                <div className="max-w-4xl mx-auto p-6">
                    {photoModal && <PhotoModal url={photoModal} onClose={() => setPhotoModal(null)} />}
                    {proofModalHit && <ProofModal hit={proofModalHit} onClose={() => setProofModalHit(null)} />}

                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-3">
                            <img src="https://economysignsupply.com/wp-content/uploads/2024/07/ess-logo-svg-100.svg" alt="ESS" className="h-10" />
                            <h1 className="text-2xl font-bold text-slate-800">Invoice &amp; Delivery Search</h1>
                        </div>
                        <button onClick={() => { if(window.fbSignOut && window.fbAuth) window.fbSignOut(window.fbAuth); }} className="text-sm text-slate-400 hover:text-red-500 font-bold flex items-center gap-1">
                            <Icon name="log-out" className="h-4 w-4" /> Exit
                        </button>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-1 bg-slate-100 p-1 rounded-xl mb-6 w-fit">
                        <button
                            onClick={() => setActiveTab('history')}
                            className={`px-5 py-2.5 rounded-lg font-bold text-sm transition-colors flex items-center gap-2 ${activeTab === 'history' ? 'bg-white text-ess-blue shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            <Icon name="clock" className="h-4 w-4" /> Invoice History
                        </button>
                        <button
                            onClick={() => setActiveTab('proof')}
                            className={`px-5 py-2.5 rounded-lg font-bold text-sm transition-colors flex items-center gap-2 ${activeTab === 'proof' ? 'bg-white text-ess-blue shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            <Icon name="camera" className="h-4 w-4" /> Proof of Delivery
                        </button>
                    </div>

                    {/* ── TAB: Invoice History ── */}
                    {activeTab === 'history' && (
                        <div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
                                <div className="flex gap-3">
                                    <div className="relative flex-1">
                                        <Icon name="search" className="absolute left-3 top-3.5 text-slate-400 h-5 w-5" />
                                        <input
                                            type="text"
                                            className="w-full pl-10 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-ess-blue text-base"
                                            placeholder="Invoice # or Client Name…"
                                            value={searchTerm}
                                            onChange={e => setSearchTerm(e.target.value)}
                                            onKeyDown={handleKeyDown}
                                            autoFocus
                                        />
                                    </div>
                                    <button onClick={handleSearch} className="bg-ess-blue text-white px-6 py-3 rounded-lg font-bold hover:bg-sky-700 transition-colors shadow">
                                        Search
                                    </button>
                                </div>
                                <p className="text-xs text-slate-400 mt-2">Searching last 6 weeks · {plans.length} plans loaded</p>
                            </div>

                            <div className="space-y-3">
                                {results.length > 0 ? results.map((hit, idx) => (
                                    <div key={idx} onClick={() => setProofModalHit(hit)} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:shadow-md hover:border-ess-blue transition-all cursor-pointer">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="font-bold text-lg text-slate-800">{hit.client}</h3>
                                                <p className="text-sm text-slate-500">{hit.address}</p>
                                            </div>
                                            <div className="font-mono font-bold text-base bg-yellow-100 text-yellow-800 px-3 py-1 rounded-lg">
                                                {hit.invoices || 'No Inv #'}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-3 gap-3 mt-3 pt-3 border-t border-slate-100 text-sm">
                                            <div>
                                                <span className="block text-slate-400 text-xs font-bold uppercase mb-0.5">Date</span>
                                                <span className="font-bold text-slate-700 flex items-center gap-1"><Icon name="calendar" className="h-3 w-3" /> {hit.date}</span>
                                            </div>
                                            <div>
                                                <span className="block text-slate-400 text-xs font-bold uppercase mb-0.5">Driver</span>
                                                <span className={`font-bold flex items-center gap-1 ${hit.driver === 'Unassigned' ? 'text-red-500' : 'text-green-600'}`}>
                                                    <Icon name="truck" className="h-3 w-3" /> {hit.driver}
                                                </span>
                                            </div>
                                            <div>
                                                <span className="block text-slate-400 text-xs font-bold uppercase mb-0.5">Zone</span>
                                                <span className="font-bold text-slate-700">{hit.zone}</span>
                                            </div>
                                        </div>
                                    </div>
                                )) : searchTerm ? (
                                    <div className="text-center py-10 text-slate-400">No results for "{searchTerm}" in the last 6 weeks.</div>
                                ) : (
                                    <div className="text-center py-20 text-slate-300 flex flex-col items-center">
                                        <Icon name="search" className="h-16 w-16 mb-4 opacity-20" />
                                        <p>Enter an invoice number or client name.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ── TAB: Proof of Delivery ── */}
                    {activeTab === 'proof' && (
                        <div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6 space-y-4">
                                <div className="flex gap-3">
                                    <div className="relative flex-1">
                                        <Icon name="hash" className="absolute left-3 top-3.5 text-slate-400 h-5 w-5" />
                                        <input
                                            type="text"
                                            className="w-full pl-10 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-ess-blue text-base"
                                            placeholder="Invoice #, customer name, or address"
                                            value={proofTerm}
                                            onChange={e => setProofTerm(e.target.value)}
                                            onKeyDown={handleProofKeyDown}
                                            autoFocus
                                        />
                                    </div>
                                    <button onClick={searchProofs} disabled={proofLoading} className="bg-ess-blue text-white px-6 py-3 rounded-lg font-bold hover:bg-sky-700 transition-colors shadow disabled:opacity-50 flex items-center gap-2">
                                        {proofLoading ? <div className="border-2 border-white border-t-transparent rounded-full w-4 h-4 animate-spin" /> : <Icon name="search" className="h-4 w-4" />}
                                        Search
                                    </button>
                                </div>
                                <div className="flex gap-3 items-center">
                                    <span className="text-xs font-bold text-slate-500 uppercase whitespace-nowrap">Date range</span>
                                    <input
                                        type="date"
                                        className="flex-1 p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-ess-blue"
                                        value={proofDateFrom}
                                        onChange={e => setProofDateFrom(e.target.value)}
                                    />
                                    <span className="text-slate-400 text-sm">to</span>
                                    <input
                                        type="date"
                                        className="flex-1 p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-ess-blue"
                                        value={proofDateTo}
                                        onChange={e => setProofDateTo(e.target.value)}
                                    />
                                    {(proofDateFrom || proofDateTo) && (
                                        <button onClick={() => { setProofDateFrom(''); setProofDateTo(''); }} className="text-slate-400 hover:text-red-500 p-1" title="Clear dates">
                                            <Icon name="x" className="h-4 w-4" />
                                        </button>
                                    )}
                                </div>
                                <p className="text-xs text-slate-400">Search by invoice #, customer name, or address. Optionally filter by date range.</p>
                            </div>

                            {/* Proof results */}
                            <div className="space-y-3">
                                {proofLoading && (
                                    <div className="text-center py-10 text-slate-400 flex flex-col items-center gap-3">
                                        <div className="border-3 border-slate-200 border-t-ess-blue rounded-full w-8 h-8 animate-spin" style={{borderWidth:3}} />
                                        <span className="text-sm">Searching…</span>
                                    </div>
                                )}

                                {!proofLoading && proofSearched && proofResults.length === 0 && (
                                    <div className="text-center py-14 text-slate-400 flex flex-col items-center gap-2">
                                        <Icon name="camera-off" className="h-12 w-12 opacity-20" />
                                        <p className="font-medium">No proof of delivery found.</p>
                                        <p className="text-xs">Try a different invoice number or date range.</p>
                                    </div>
                                )}

                                {!proofLoading && proofResults.map((proof, idx) => (
                                    <div key={idx} className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex gap-4 items-start hover:shadow-md transition-shadow">
                                        {/* Photo thumbnail */}
                                        {proof.photoUrl ? (
                                            <button onClick={() => setPhotoModal(proof.photoUrl)} className="flex-shrink-0 group" title="View photo">
                                                <img
                                                    src={proof.photoUrl}
                                                    alt="proof"
                                                    className="w-20 h-20 rounded-xl object-cover border-2 border-slate-200 group-hover:border-ess-blue transition-colors shadow-sm"
                                                />
                                                <p className="text-xs text-center text-slate-400 mt-1 group-hover:text-ess-blue">View</p>
                                            </button>
                                        ) : (
                                            <div className="flex-shrink-0 w-20 h-20 rounded-xl bg-slate-100 flex items-center justify-center border-2 border-dashed border-slate-200">
                                                <Icon name="camera-off" className="h-6 w-6 text-slate-300" />
                                            </div>
                                        )}

                                        {/* Info */}
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-start justify-between gap-2 mb-1">
                                                <h3 className="font-bold text-slate-800 truncate">{proof.customerName}</h3>
                                                <span className="font-mono font-bold text-sm bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded flex-shrink-0">
                                                    {proof.invoicesRaw || proof.invoices?.join(', ') || '–'}
                                                </span>
                                            </div>
                                            <p className="text-xs text-slate-500 truncate mb-2">{proof.stopAddress}</p>
                                            <div className="grid grid-cols-3 gap-2 text-xs">
                                                <div>
                                                    <span className="text-slate-400 font-bold uppercase block">Date</span>
                                                    <span className="font-bold text-slate-700">{proof.date}</span>
                                                </div>
                                                <div>
                                                    <span className="text-slate-400 font-bold uppercase block">Driver</span>
                                                    <span className="font-bold text-green-600 flex items-center gap-1">
                                                        <Icon name="truck" className="h-3 w-3" /> {proof.driverName || '–'}
                                                    </span>
                                                </div>
                                                <div>
                                                    <span className="text-slate-400 font-bold uppercase block">Zone</span>
                                                    <span className="font-bold text-slate-700">{proof.zoneName || '–'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {!proofLoading && !proofSearched && (
                                    <div className="text-center py-20 text-slate-300 flex flex-col items-center">
                                        <Icon name="camera" className="h-16 w-16 mb-4 opacity-20" />
                                        <p>Search by invoice #, customer name, or address.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InvoiceSearchApp />);
    </script>
</body>
</html>
